name: main

on:
  workflow_dispatch:
  push:
    branches:
      - prime
    tags:
      - "*"
  pull_request:
    branches:
      - prime

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4

      - name: Build
        run: >
          dotnet build
          -p:CSharpier_Bypass=true
          --configuration Release

      - name: Verify formatting
        id: verify
        run: >
          dotnet build
          -t:CSharpierFormat
          --configuration Release
          --no-restore

      - name: Report issues
        if: ${{ failure() && steps.verify.outcome == 'failure' }}
        run: echo "::error title=Bad formatting::Formatting issues detected. Please build the solution locally to fix them."

  pack:
    strategy:
      matrix:
        rid:
          - win-arm64
          - win-x86
          - win-x64
          - linux-arm64
          - linux-x64
          - osx-arm64
          - osx-x64
        bundle-ffmpeg:
          - true
          - false
        include:
          - bundle-ffmpeg: true
            artifact-name-base: YoutubeDownloader
          - bundle-ffmpeg: false
            artifact-name-base: YoutubeDownloader.Bare

    runs-on: ${{ startsWith(matrix.rid, 'win-') && 'windows-latest' || startsWith(matrix.rid, 'osx-') && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4

      - name: Parse version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            CLEAN_VERSION=${GITHUB_REF_NAME#v}
          else
            CLEAN_VERSION="999.9.9-ci-${{ github.sha }}"
          fi
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Publish app
        run: >
          dotnet publish YoutubeDownloader
          -p:Version=${{ steps.version.outputs.clean_version }}
          -p:CSharpier_Bypass=true
          -p:EncryptionSalt=${{ secrets.ENCRYPTION_SALT || 'HimalayanPinkSalt' }}
          -p:DownloadFFmpeg=${{ matrix.bundle-ffmpeg }}
          -p:PublishMacOSBundle=${{ startsWith(matrix.rid, 'osx-') }}
          --output YoutubeDownloader/bin/publish
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained

      - name: Upload app binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name-base }}.${{ matrix.rid }}
          path: YoutubeDownloader/bin/publish
          if-no-files-found: error

  release:
    if: ${{ github.ref_type == 'tag' }}
    needs: [format, pack]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ github.ref_name }}
          --repo ${{ github.event.repository.full_name }}
          --title ${{ github.ref_name }}
          --generate-notes
          --verify-tag

  deploy:
    needs: release
    strategy:
      matrix:
        rid: [win-arm64, win-x86, win-x64, linux-arm64, linux-x64, osx-arm64, osx-x64]
        bundle-ffmpeg: [true, false]
        include:
          - bundle-ffmpeg: true
            artifact-name-base: YoutubeDownloader
          - bundle-ffmpeg: false
            artifact-name-base: YoutubeDownloader.Bare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download app binaries
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name-base }}.${{ matrix.rid }}
          path: YoutubeDownloader/

      - name: Set permissions
        if: ${{ !startsWith(matrix.rid, 'win-') }}
        run: |
          chmod +x YoutubeDownloader/YoutubeDownloader 2>/dev/null || true
          chmod +x YoutubeDownloader/ffmpeg 2>/dev/null || true

      - name: Create package
        working-directory: YoutubeDownloader/
        run: zip -r ../${{ matrix.artifact-name-base }}.${{ matrix.rid }}.zip .

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact-name-base }}.${{ matrix.rid }}.zip --repo ${{ github.event.repository.full_name }}

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify KOOK (Card Message)
        run: |
          curl -X POST 'https://www.kookapp.cn/api/v3/message/create' \
          -H 'Authorization: Bot ${{ secrets.KOOK_BOT_TOKEN }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "type": 10,
            "target_id": "${{ secrets.KOOK_CHANNEL_ID }}",
            "content": "[{\"type\":\"card\",\"theme\":\"success\",\"size\":\"lg\",\"modules\":[{\"type\":\"header\",\"text\":{\"type\":\"plain-text\",\"content\":\"🚀 CodePivot 构建报告\"}},{\"type\":\"section\",\"text\":{\"type\":\"kmarkdown\",\"content\":\"**项目：** ${{ github.event.repository.name }}\\n**版本：** `${{ github.ref_name }}`\\n\\n新版本已成功发布至 GitHub Release。所有平台（Windows/Linux/macOS）的二进制文件已就绪。\"}},{\"type\":\"divider\"},{\"type\":\"action-group\",\"elements\":[{\"type\":\"button\",\"theme\":\"primary\",\"text\":{\"type\":\"plain-text\",\"content\":\"📦 立即下载\"},\"click\":\"link\",\"value\":\"${{ github.event.repository.html_url }}/releases/tag/${{ github.ref_name }}\"}]}]}]"
          }'
